name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly ML-extras run — torch is too heavy to install on every push.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    if: github.event_name != 'schedule'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Every supported Python on Ubuntu; the newest supported Python on
        # Windows and macOS (README claims all three platforms).
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          - os: windows-latest
            python-version: "3.14"
          - os: macos-latest
            python-version: "3.14"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package and test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest -q

  floor-versions:
    name: Lowest supported dependencies
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install exact minimum dependency versions
        # These pins validate the floors declared in pyproject.toml
        # [project.dependencies]; raise a floor only together with this list.
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "numpy==1.24.4" "scipy==1.10.1" "pillow==10.0.1" \
            "matplotlib==3.7.5" "pyFAI==2024.1.0" "fabio==2023.10.0" \
            "h5py==3.8.0" "pytest>=8"
          python -m pip install --no-deps -e .
      - name: Run tests against the dependency floor
        run: python -m pytest -q

  optional-dependencies:
    name: Optional scientific dependencies
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install optional dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,io,stacks,phases]"
      - name: Run tests
        run: python -m pytest -q

  gui-startup:
    name: Headless GUI startup (xvfb)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Install package and test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Construct and close the unified application under xvfb
        run: xvfb-run -a python -m pytest -q tests/test_gui_startup.py

  build:
    name: Build and install distributions
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Build wheel and source distribution
        run: python -m pip install --upgrade pip build twine && python -m build
      - name: Check distribution metadata
        run: python -m twine check dist/*
      - name: Smoke-test the wheel in a clean venv
        run: |
          python -m venv /tmp/wheel-venv
          /tmp/wheel-venv/bin/pip install --quiet dist/*.whl
          cd /tmp && /tmp/wheel-venv/bin/python -c "import seriesxrd; print(seriesxrd.__version__)"
          /tmp/wheel-venv/bin/seriesxrd --help
      - name: Smoke-test the sdist in a clean venv
        run: |
          python -m venv /tmp/sdist-venv
          /tmp/sdist-venv/bin/pip install --quiet dist/*.tar.gz
          cd /tmp && /tmp/sdist-venv/bin/python -c "import seriesxrd; print(seriesxrd.__version__)"
          /tmp/sdist-venv/bin/seriesxrd --help

  ml-extras:
    name: ML extras (weekly)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install with ML extras (CPU torch)
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -e ".[dev,io,stacks,phases]"
      - name: Run tests including torch-dependent paths
        run: python -m pytest -q
