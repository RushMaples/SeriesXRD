name: Bug report
description: Report reproducible incorrect behavior in SeriesXRD.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: Thank you for helping improve SeriesXRD. Do not attach confidential or unpublished data.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include the smallest reproducible sequence and sanitized configuration values.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: SeriesXRD version
      placeholder: "0.2.0"
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Python version and operating system
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      render: shell
